{% extends 'main/base.html' %}
{% block title %}Sign Up - Pigi Bank{% endblock %}
{% block content %}
<section class="form-container page-shell">
    <div class="form-box">
        <div class="section-heading">
            <p class="eyebrow">New customer</p>
            <h1>Create your account</h1>
            <p>Enter the basic details needed to generate your account number.</p>
        </div>

        <form method="POST" class="stacked-form">
            {% csrf_token %}
            <div class="field-group">
                <label for="name">Full name</label>
                <input id="name" type="text" name="name" placeholder="Full name" autocomplete="name" required>
            </div>
            <div class="field-grid">
                <div class="field-group">
                    <label for="dob">Date of birth</label>
                    <input id="dob" type="date" name="dob" required>
                </div>
                <div class="field-group">
                    <label for="gender">Gender</label>
                    <select id="gender" name="gender" required>
                        <option value="">Select gender</option>
                        <option value="M">Male</option>
                        <option value="F">Female</option>
                        <option value="O">Other</option>
                    </select>
                </div>
            </div>
            <div class="field-grid">
                <div class="field-group">
                    <label for="city">City</label>
                    <input id="city" type="text" name="city" placeholder="City" autocomplete="address-level2" required>
                </div>
                <div class="field-group">
                    <label for="country">Country</label>
                    <input id="country" type="text" name="country" placeholder="Country" autocomplete="country-name" required>
                </div>
            </div>
            <div class="field-group">
                <label for="pincode">Pincode</label>
                <input id="pincode" type="text" name="pincode" placeholder="Pincode" inputmode="numeric" autocomplete="postal-code" required>
            </div>
            <button type="submit" class="btn btn-primary">Register</button>
        </form>
        <p class="form-footer">Already have an account? <a href="{% url 'login' %}">Login</a></p>
    </div>
</section>
{% endblock %}
