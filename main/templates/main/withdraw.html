{% extends 'main/base.html' %}
{% block title %}Withdraw - Pigi Bank{% endblock %}

{% block content %}
<section class="form-container page-shell">
  <div class="form-box">
    <div class="section-heading">
      <p class="eyebrow">Cash out</p>
      <h1>Withdraw money</h1>
      <p>Your current balance is <strong>Rs. {{ user.balance }}</strong>.</p>
    </div>

    <form method="POST" class="stacked-form">
      {% csrf_token %}
      <div class="field-group">
        <label for="amount">Amount</label>
        <input id="amount" type="number" name="amount" placeholder="Enter amount" step="0.01" min="1" required>
      </div>
      <button type="submit" class="btn btn-primary">Withdraw</button>
    </form>

    <p class="form-footer"><a href="{% url 'bank_dashboard' %}">Back to dashboard</a></p>
  </div>
</section>
{% endblock %}
